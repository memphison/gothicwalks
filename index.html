<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gothic Walks | Coming Soon</title>
  <meta name="description" content="Gothic Walks is coming very soon to Savannah." />
  <style>
    :root {
      --bg: #0a0a0d;
      --panel: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.14);
      --text: #f4f1ea;
      --muted: #b9b2a7;
      --accent: #8f7a5a;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(143,122,90,0.18), transparent 35%),
        linear-gradient(180deg, #111117 0%, #09090c 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .frame {
      width: 100%;
      max-width: 980px;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
      backdrop-filter: blur(8px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.45);
      position: relative;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      pointer-events: none;
    }

    .frame::after {
      inset: 28px;
      border-color: rgba(143,122,90,0.15);
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 88px 48px;
      text-align: center;
    }

    .eyebrow {
      letter-spacing: 0.32em;
      text-transform: uppercase;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.6rem, 7vw, 5.8rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      line-height: 0.95;
      text-shadow: 0 2px 22px rgba(0,0,0,0.45);
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 28px auto 30px;
    }

    .subhead {
      margin: 0 auto;
      max-width: 660px;
      font-size: clamp(1.05rem, 2vw, 1.4rem);
      line-height: 1.7;
      color: var(--muted);
    }

    .subhead strong {
      color: var(--text);
      font-weight: 600;
    }

    .footer {
      margin-top: 38px;
      font-size: 0.92rem;
      color: #9b9388;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .content {
        padding: 72px 24px;
      }

      .eyebrow,
      .footer {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <section class="content">
      <div class="eyebrow">Savannah After Dark</div>
      <h1>Gothic Walks</h1>
      <div class="divider"></div>
      <p class="subhead"><strong>Arriving Soon in Savannah’s Shadows.</strong><br />A darker walk through one of America’s most haunted cities.</p>
      <div class="footer">gothicwalks.com</div>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application Received | Gothic Walks</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital@0;1&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: radial-gradient(circle at top, #2a2a2a 0%, #121212 50%, #090909 100%);
      color: #f2ede4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 600px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 30px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 38px;
      margin-bottom: 20px;
      line-height: 1.1;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #ddd4c6;
      margin-bottom: 20px;
    }

    .small {
      font-size: 14px;
      color: #cfc4b3;
      margin-top: 10px;
      font-style: italic;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 30px;
      background: #efe4d0;
      color: #111;
      text-decoration: none;
      font-weight: bold;
    }

    a:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <div class="card">

    <div style="letter-spacing:3px; font-size:12px; margin-bottom:10px;">
      GOTHIC WALKS
    </div>

    <h1>
      We’ve Got Your Info.
    </h1>

    <p>
      Thank you for reaching out. <br> We’ll take a look and get back to you shortly.
    </p>

    <p>
      If it’s a fit, we’ll reach out soon to talk next steps.
    </p>

    <div class="small">
      Not your average ghost tour. Definitely not your average crew.
    </div>

   <!-- <a href="/">Back to Site</a> -->

  </div>

</body>
</html>
